apiVersion: v1
kind: Service
metadata:
  name: python-test-app-service
spec:
  type: {{ .Values.service.type }}
  selector:
    app: python-app
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: 5000
    - name: metrics
      protocol: TCP
      port: {{ .Values.metrics.port }}
      targetPort: 8000
